"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$character"
palette = "catppuccin_mocha"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold mauve)"

[directory]
style = "bold blue"
truncation_length = 2
truncation_symbol = "…/"
read_only = " "
read_only_style = "red"
repo_root_style = "bold lavender"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic mauve"

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "peach"
conflicted = "= "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "? "
stashed = " "
modified = " "
staged = "+ "
renamed = "» "
deleted = "✘ "

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
overlay0 = "#6c7086"
surface0 = "#313244"
base = "#1e1e2e"

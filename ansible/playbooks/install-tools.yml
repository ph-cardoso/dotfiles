---
- name: Instalar ferramentas e dependencias
  hosts: local
  gather_facts: true
  vars:
    homebrew_prefix: /home/linuxbrew/.linuxbrew
    homebrew_bin: /home/linuxbrew/.linuxbrew/bin/brew
    homebrew_packages:
      - name: starship
        bin: starship
      - name: fzf
        bin: fzf
      - name: ripgrep
        bin: rg
      - name: fd
        bin: fd
      - name: eza
        bin: eza
      - name: bat
        bin: bat
  tasks:
    - name: Instalar dependencias base via apt
      ansible.builtin.apt:
        name:
          - build-essential
          - ca-certificates
          - curl
          - file
          - git
          - zsh
        state: present
        update_cache: true
      become: true

    - name: Definir shell padrao como zsh
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        shell: /usr/bin/zsh
      become: true

    - name: Verificar instalacao do Homebrew
      ansible.builtin.stat:
        path: "{{ homebrew_bin }}"
      register: homebrew_stat

    - name: Instalar Homebrew
      ansible.builtin.command:
        cmd: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not homebrew_stat.stat.exists
      environment:
        NONINTERACTIVE: "1"
      become: false

    - name: Garantir que o Homebrew esta disponivel
      ansible.builtin.command:
        cmd: "{{ homebrew_bin }} --version"
      register: homebrew_version
      changed_when: false

    - name: Instalar pacotes via Homebrew
      ansible.builtin.command:
        cmd: "{{ homebrew_bin }} install {{ item.name }}"
        creates: "{{ homebrew_prefix }}/bin/{{ item.bin }}"
      loop: "{{ homebrew_packages }}"

    - name: Instalar script de integracao do fzf
      ansible.builtin.command:
        cmd: "{{ homebrew_prefix }}/opt/fzf/install --all --no-bash --no-fish"
        creates: "{{ ansible_env.HOME }}/.fzf.zsh"

    - name: Verificar instalacao do uv
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.local/bin/uv"
      register: uv_stat

    - name: Instalar uv
      ansible.builtin.command:
        cmd: /bin/bash -c "curl -LsSf https://astral.sh/uv/install.sh | sh"
      when: not uv_stat.stat.exists
      become: false

    - name: Verificar instalacao do nvm
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
      register: nvm_stat

    - name: Instalar nvm
      ansible.builtin.command:
        cmd: /bin/bash -c "curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash"
      when: not nvm_stat.stat.exists
      become: false

    - name: Verificar instalacao do pnpm
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.local/share/pnpm/pnpm"
      register: pnpm_stat

    - name: Instalar pnpm
      ansible.builtin.command:
        cmd: /bin/bash -c "curl -fsSL https://get.pnpm.io/install.sh | sh -"
      when: not pnpm_stat.stat.exists
      become: false
